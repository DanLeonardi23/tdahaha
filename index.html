<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TDAHAHA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="nav-logo">TDAH<span>AHA</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('main', this)">Início</button>
      <button class="nav-tab notes-tab" onclick="showPage('notes', this)">Ideias</button>
    </div>
    <div class="nav-time" id="clock">00:00</div>
  </nav>

  <!-- MAIN PAGE -->
  <div class="page active" id="page-main">
    <div class="main-grid">

      <!-- LEFT: Timer + Tasks -->
      <div class="left-col">
        <!-- Timer -->
        <div class="card timer-card">
          <div class="timer-header-row">
            <div class="card-title" style="margin-bottom:0;">Cronometro regressivo</div>
            <button class="mute-btn" id="mute-btn" onclick="toggleMute()" title="Som">
              <svg id="mute-icon-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
              <svg id="mute-icon-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
            </button>
          </div>
          <div class="timer-presets">
            <button class="preset-btn" onclick="applyPreset(5)">5 min</button>
            <button class="preset-btn" onclick="applyPreset(10)">10 min</button>
            <button class="preset-btn" onclick="applyPreset(25)">25 min</button>
            <button class="preset-btn" onclick="applyPreset(45)">45 min</button>
          </div>
          <div class="timer-set-row">
            <input class="timer-set-input" id="timer-set-input" type="text"
              value="00:00:00" maxlength="8" inputmode="numeric"
              onkeydown="timerInputKeydown(event)"
              onkeyup="timerInputKeyup(event)"
              onfocus="timerInputFocus()"
              onpaste="return false;" />
            <button class="timer-set-btn" onclick="setTimerFromInput()">Definir</button>
          </div>
          <div class="timer-display" id="timer-display">00:00:00</div>
          <div class="timer-progress-track">
            <div class="timer-progress" id="timer-progress"></div>
          </div>
          <div class="timer-btns">
            <button class="timer-btn start" id="timer-start-btn" onclick="toggleTimer()">Iniciar</button>
            <button class="timer-btn reset" onclick="resetTimer()">Zerar</button>
          </div>
          <div class="timer-label" id="timer-label">Escolha um preset ou digite o tempo</div>
        </div>

        <!-- Tasks -->
        <div class="card tasks-card">
          <div class="tasks-header">
            <span class="card-title">Tarefas</span>
          </div>
          <div class="task-input-row">
            <input class="task-input" id="task-input" placeholder="Nova tarefa..." onkeydown="if(event.key==='Enter')addTask()" />
            <button class="task-add-confirm" onclick="addTask()">+</button>
          </div>
          <div class="tasks-list" id="tasks-list"></div>
          <div class="tasks-done-bar">
            <span class="tasks-done-label">Concluídas hoje</span>
            <span class="tasks-done-count" id="stat-tasks">0</span>
          </div>
          <button class="tasks-clear-btn" onclick="clearDoneTasks()">Limpar concluídas</button>
        </div>
      </div>

      <!-- CENTER: Calendar -->
      <div class="card calendar-card">
        <div class="cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
          <div class="cal-month" id="cal-month-label"></div>
          <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-event-area">
          <div class="cal-event-title" id="cal-day-label">Eventos</div>
          <div id="cal-events-list"></div>
          <div class="cal-add-event">
            <input class="cal-event-input" id="cal-event-input" placeholder="Adicionar evento..." onkeydown="if(event.key==='Enter')addCalEvent()" />
            <button class="cal-event-btn" onclick="addCalEvent()">+</button>
          </div>
        </div>
      </div>

      <!-- RIGHT: Reminders + Stats -->
      <div class="right-col">
        <div class="card reminders-card">
          <div class="tasks-header">
            <span class="card-title">Lembretes Rápidos</span>
          </div>
          <div class="reminder-list" id="reminder-list"></div>
          <div class="reminder-input-row">
            <div class="reminder-inputs">
              <input class="reminder-input" id="reminder-input" placeholder="Novo lembrete..." onkeydown="if(event.key==='Enter')addReminder()" />
              <input class="reminder-time-input" id="reminder-time" type="time" />
            </div>
            <button class="reminder-add-btn" onclick="addReminder()">Adicionar</button>
          </div>
        </div>

        <div class="card stats-card">
          <div class="card-title">Hoje</div>
          <div class="stats-grid">
            <div class="stat-box stat-green">
              <div class="stat-number green" id="stat-reminders">0</div>
              <div class="stat-label">Lembretes</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- NOTES PAGE -->
  <div class="page" id="page-notes">
    <div class="notes-page">
      <div class="notes-header">
        <div class="notes-page-title">Bloco de Ideias</div>
        <button class="new-note-btn" onclick="newNote()">+ Nova Ideia</button>
      </div>
      <div class="notes-body">
        <div class="notes-sidebar" id="notes-sidebar"></div>
        <div class="note-editor" id="note-editor">
          <div class="empty-notes" id="empty-notes">
            <div class="empty-icon">💡</div>
            <div class="empty-text">Clique em "Nova Ideia" para começar</div>
          </div>
          <input class="note-title-input" id="note-title" placeholder="Título da ideia..." oninput="updateNotePreview()" style="display:none;" />
          <textarea class="note-content-input" id="note-content" placeholder="Escreva sua ideia aqui... Não julgue, só deixa fluir!" oninput="updateNotePreview()" style="display:none;"></textarea>
          <div class="note-footer" id="note-footer" style="display:none;">
            <span class="note-char-count" id="char-count">0 caracteres</span>
            <div class="note-actions">
              <button class="note-del-btn" onclick="deleteNote()">Apagar</button>
              <button class="note-save-btn" onclick="saveNote()">Salvar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TIMER ALERT OVERLAY -->
<div id="timer-alert-overlay" style="display:none;">
  <div class="alert-box">
    <div class="alert-icon">⏰</div>
    <div class="alert-title">TEMPO ESGOTADO</div>
    <div id="alert-muted-badge" class="alert-muted-badge" style="display:none;">som desativado</div>
    <div class="alert-sub">Seu cronômetro chegou ao fim!</div>
    <button class="alert-btn" onclick="closeTimerAlert()">OK, entendi!</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
